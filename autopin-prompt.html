<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Auto-pin Conflict</title>
    <style>
      :root {
        --bg: #23262b;
        --surface: #2a2e34;
        --border-soft: #434953;
        --text: #e8edf7;
        --muted: #b3bccd;
        --accent: rgb(122, 151, 251);
        --accent-strong: #9fb6ff;
      }

      html,
      body {
        margin: 0;
        width: 400px;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      .wrap {
        padding: 14px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .sub {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .host {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .cards {
        display: grid;
        gap: 8px;
        margin-bottom: 10px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        padding: 8px;
        font-size: 12px;
      }

      .card strong {
        display: block;
        margin-bottom: 5px;
      }

      .line {
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      button {
        flex: 1;
        border: 1px solid var(--accent);
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      #keep-old {
        background: #2f343c;
        color: var(--text);
      }

      #keep-old:hover {
        background: #363c45;
        border-color: var(--accent-strong);
      }

      #keep-new {
        background: rgba(122, 151, 251, 0.18);
        color: #dce6ff;
        font-weight: 600;
      }

      #keep-new:hover {
        background: rgba(122, 151, 251, 0.28);
        border-color: var(--accent-strong);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Auto-pin conflict</h1>
      <p class="sub">Only one tab is allowed for this hostname.</p>
      <div class="host" id="host"></div>
      <div class="cards">
        <div class="card">
          <strong>Old tab</strong>
          <div class="line" id="old-title"></div>
          <div class="line" id="old-url"></div>
        </div>
        <div class="card">
          <strong>New tab</strong>
          <div class="line" id="new-title"></div>
          <div class="line" id="new-url"></div>
        </div>
      </div>
      <div class="actions">
        <button id="keep-old">Keep old</button>
        <button id="keep-new">Keep new</button>
      </div>
    </div>

    <script src="autopin-prompt.js"></script>
  </body>
</html>
