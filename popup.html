<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tabinator</title>
    <style>
      :root {
        --bg: #23262b;
        --surface: #2a2e34;
        --text: #e8edf7;
        --muted: #b3bccd;
        --accent: rgb(122, 151, 251);
        --accent-2: #9fb6ff;
        --border-soft: #434953;
      }
      html,
      body {
        margin: 0;
        padding: 14px;
        min-width: 280px;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--bg);
        border-radius: 16px;
        overflow: hidden;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 16px;
      }
      p {
        margin: 0 0 12px;
        font-size: 12px;
        color: var(--muted);
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border-soft);
        border-radius: 12px;
        padding: 12px;
      }
      label {
        display: block;
        font-size: 12px;
        margin-bottom: 6px;
      }
      .row {
        display: flex;
        gap: 8px;
      }
      input[type="number"] {
        flex: 1;
        border: 1px solid var(--border-soft);
        background: #32373f;
        color: var(--text);
        border-radius: 8px;
        padding: 8px;
        font-size: 14px;
      }
      button {
        border: 1px solid var(--accent);
        border-radius: 8px;
        background: rgba(122, 151, 251, 0.18);
        color: #dce6ff;
        padding: 8px 12px;
        font-size: 13px;
        cursor: pointer;
      }
      button:hover {
        background: rgba(122, 151, 251, 0.28);
        border-color: var(--accent-2);
      }
      #status {
        margin-top: 8px;
        min-height: 16px;
        font-size: 12px;
        color: var(--muted);
      }
      .divider {
        border: none;
        border-top: 1px solid var(--border-soft);
        margin: 14px 0;
      }
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .toggle-row label {
        margin: 0;
        font-size: 13px;
        font-weight: 600;
      }
      .switch {
        position: relative;
        width: 36px;
        height: 20px;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: #32373f;
        border: 1px solid var(--border-soft);
        border-radius: 20px;
        transition: background 200ms;
      }
      .slider::before {
        content: "";
        position: absolute;
        width: 14px;
        height: 14px;
        left: 2px;
        bottom: 2px;
        background: var(--text);
        border-radius: 50%;
        transition: transform 200ms;
      }
      .switch input:checked + .slider {
        background: var(--accent);
        border-color: var(--accent);
      }
      .switch input:checked + .slider::before {
        transform: translateX(16px);
      }
      .pattern-list {
        display: grid;
        gap: 4px;
        max-height: 180px;
        overflow-y: auto;
        margin-bottom: 8px;
      }
      .pattern-item {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 6px;
        align-items: center;
        background: #32373f;
        border: 1px solid var(--border-soft);
        border-radius: 6px;
        padding: 5px 8px;
        font-size: 12px;
        word-break: break-all;
      }
      .pattern-item .remove-btn {
        width: 20px;
        height: 20px;
        line-height: 20px;
        text-align: center;
        border-radius: 4px;
        background: transparent;
        color: var(--muted);
        border: 1px solid transparent;
        font-size: 12px;
        font-weight: 700;
        padding: 0;
        cursor: pointer;
      }
      .pattern-item .remove-btn:hover {
        background: #3a3f48;
        border-color: var(--border-soft);
        color: var(--text);
      }
      .add-row {
        display: flex;
        gap: 6px;
      }
      .add-row input[type="text"] {
        flex: 1;
        border: 1px solid var(--border-soft);
        background: #32373f;
        color: var(--text);
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 12px;
      }
      .add-row button {
        font-size: 12px;
        padding: 6px 10px;
      }
      .btn-link {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 11px;
        cursor: pointer;
        padding: 4px 0;
        margin-top: 4px;
      }
      .btn-link:hover {
        color: var(--text);
      }
      .hint {
        font-size: 11px;
        color: var(--muted);
        margin: 0 0 8px;
      }
    </style>
  </head>
  <body>
    <h1>Tabinator</h1>
    <p>Set max unpinned tabs per window.</p>

    <div class="card">
      <label for="limit">Unpinned tab limit</label>
      <div class="row">
        <input id="limit" type="number" min="1" max="100" />
        <button id="save">Save</button>
      </div>
      <div id="status"></div>
    </div>

    <hr class="divider" />

    <div class="card">
      <div class="toggle-row">
        <label>Auto-close tabs</label>
        <label class="switch">
          <input type="checkbox" id="auto-close-toggle" />
          <span class="slider"></span>
        </label>
      </div>
      <p class="hint">
        Tabs matching these URL patterns are closed automatically when the tab
        limit is hit, before prompting you.
      </p>
      <div id="pattern-list" class="pattern-list"></div>
      <div class="add-row">
        <input
          type="text"
          id="new-pattern"
          placeholder="e.g. signin.aws.amazon.com"
        />
        <button id="add-pattern">Add</button>
      </div>
      <button class="btn-link" id="reset-patterns">Reset to defaults</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
